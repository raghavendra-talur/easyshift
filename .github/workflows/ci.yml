name: CI
on:

  push:
    tags:
      - v*
    branches:
      - main
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

jobs:

  check:
    name: lint, build, and test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:

      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Install dependencies (macOS)

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
        id: go

        if: matrix.os == 'macos-latest'
        run: |
          echo "install deps (macos)"

      - name: Install dependencies (Linux/Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "install deps (linux)"

      - name: run checks (linters, build, and unit tests)
        run: make check
        shell: bash
