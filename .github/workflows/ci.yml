name: CI

on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: make check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      # Placeholders for future system dependencies (e.g. libvirt client
      # tools once e2e jobs exist). `make check` needs only Go today.
      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: echo "no extra macOS dependencies needed yet"

      - name: Install dependencies (Linux/Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: echo "no extra Linux dependencies needed yet"

      - name: Run checks (lint, build, and unit tests)
        run: make check
